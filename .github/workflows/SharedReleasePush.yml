name: SharedReleasePush

# SPDX-FileCopyrightText: 2026 Sangoma US Inc.
# SPDX-License-Identifier: GPL-3.0-or-later

# This workflow should be executed upon push to a release/x branch.
# It quickly sync's release/x into weblate/x.

on:
  workflow_call:

permissions:
  contents: write

env:
  # These values should match your version numbers and grow with you.
  WEBLATE_BRANCH: ${{ endsWith(github.ref,'/16.0') && 'weblate/16.0' ||
                      endsWith(github.ref,'/17.0') && 'weblate/17.0' ||
                      endsWith(github.ref,'/18.0') && 'weblate/18.0' ||
                      'weblate/0' }}
  # The release/x numbering is nearly the same as the weblate/x numbering.
  RELEASE_BRANCH: ${{ endsWith(github.ref,'/16.0') && 'release/16.0' ||
                      endsWith(github.ref,'/17.0') && 'release/17.0' ||
                      endsWith(github.ref,'/18.0') && 'release/18.0' ||
                      'release/0' }}
    
jobs:
  Merge:
    name: Merge release/x to weblate/x
    runs-on: ubuntu-latest
    concurrency:
      group: check-shared-release-push-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout full
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prep git bot user info
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"

      - name: Checkout release/x branch
        run: git checkout "${RELEASE_BRANCH}"

      - name: Install gettext
        run: sudo apt-get install -y gettext

      - name: Ensure i18n directory exists
        run: mkdir -p i18n

      - name: Ensure base POT exists
        run: touch i18n/${{ github.event.repository.name }}.pot

      - name: Generate potential POT
        run: find . -type f \( -name "*.php" -o -name "*.js" \) | xargs xgettext --add-comments --no-location --output=/tmp/potential.pot

      - name: Push potential POT into base POT
        run: msgmerge --update i18n/${{ github.event.repository.name }}.pot /tmp/potential.pot

      - name: Possible POT work
        run: |
          git add i18n/${{ github.event.repository.name }}.pot || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: translation template updates"
            git push
          else
            echo "No changes."
          fi

      - name: Checkout weblate/x branch
        run: git checkout "${WEBLATE_BRANCH}"

      - name: Merge release/x branch into weblate/x branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: git merge "${RELEASE_BRANCH}"

      - name: Push weblate/x branch
        run: git push
